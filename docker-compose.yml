version: '3.8'

services:
  payment-system-integration:
    build: .
    container_name: payment-system-integration
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=false
    volumes:
      - ./data:/app/data
    networks:
      - payment-system-integration-network

networks:
  payment-system-integration-network:
    driver: bridge
